name: Update open source stats

on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-open-source-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Update open source stats
        run: node scripts/update-open-source-stats.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync featured resources to README
        run: node scripts/sync-readme.mjs
      - name: Validate data
        run: node scripts/validate-data.mjs
      - name: Commit open source stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md resources/resources.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update open source stats"
          git push
