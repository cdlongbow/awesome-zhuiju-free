name: Publish approved resource

on:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  issues: write

jobs:
  publish-approved-resource:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Review resource issue
        id: review
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.issue.number;
            const actor = context.actor;
            const commentBody = context.payload.comment?.body ?? "";
            const parsedCommand = parseReviewCommand(commentBody);
            const approveCommands = new Set(["ok", "/ok", "approve", "/approve", "/approve-resource"]);
            const rejectCommands = new Set(["no", "/no", "reject", "/reject"]);
            const isApprove = approveCommands.has(parsedCommand.command);
            const isReject = rejectCommands.has(parsedCommand.command);

            if (!isApprove && !isReject) {
              core.info("No resource review command found. Use `ok` to publish or `no` to reject.");
              core.setOutput("action", "ignored");
              return;
            }

            const permissionResponse =
              await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: actor
              });
            const permission = permissionResponse.data.permission;
            if (!["admin", "maintain", "write"].includes(permission)) {
              core.setFailed("Only repository maintainers can approve resource issues.");
              return;
            }

            if (isReject) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: "已标记为不收录。如后续信息变化，可以重新提交推荐。"
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issueNumber,
                state: "closed",
                state_reason: "not_planned"
              });
              core.setOutput("action", "rejected");
              return;
            }

            const issueResponse = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber
            });
            const issue = issueResponse.data;
            const body = issue.body ?? "";

            function field(label) {
              const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const pattern = new RegExp(
                `### ${escaped}\\s*\\n\\s*([\\s\\S]*?)(?=\\n### |$)`
              );
              const match = body.match(pattern);
              const value = match?.[1]?.trim();
              return value && value !== "_No response_" ? value : "";
            }

            const categoryMap = {
              "在线影视": "online_video",
              "影视APP": "video_app",
              "网盘搜索": "cloud_search",
              "网盘资源搜索": "cloud_search",
              "磁力与 BT": "magnet_search",
              "磁力链接搜索": "magnet_search",
              "字幕": "subtitles",
              "TVBox": "player",
              "TVbox播放器": "player",
              "IPTV 订阅源": "subscription",
              "IPTV 订阅源（影视仓配置地址）": "subscription",
              "订阅源": "subscription",
              "影视仓配置地址": "tvbox_config",
              "会员拼团": "membership",
              "开源项目": "open_source",
              "其他": "other"
            };

            const name = field("资源名称");
            const rawUrl = field("主页 URL");
            const categoryLabel = field("分类");
            const userSummary = field("资源简介");
            const riskText = field("已知风险");
            const checkedAtInput = field("测试日期与地区");
            const category = categoryMap[categoryLabel];

            if (!name || !rawUrl || !userSummary || !category) {
              core.setFailed("Issue is missing a required resource form field.");
              return;
            }

            let url;
            try {
              url = new URL(rawUrl);
            } catch {
              core.setFailed("The submitted homepage URL is invalid.");
              return;
            }

            if (!["http:", "https:"].includes(url.protocol)) {
              core.setFailed("Only HTTP or HTTPS resource URLs can be added.");
              return;
            }
            if (url.protocol !== "https:" && category !== "tvbox_config") {
              core.setFailed("Only HTTPS resource URLs can be added outside tvbox_config.");
              return;
            }

            const today = new Intl.DateTimeFormat("en-CA", {
              timeZone: "Asia/Shanghai",
              year: "numeric",
              month: "2-digit",
              day: "2-digit"
            }).format(new Date());
            const submittedDate = checkedAtInput.match(/\d{4}-\d{2}-\d{2}/)?.[0] ?? today;
            const baseId = url.hostname
              .replace(/^www\./, "")
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, "-")
              .replace(/^-|-$/g, "");
            const id = `${baseId || "resource"}-${issueNumber}`;
            const resourcesPath = path.join(process.env.GITHUB_WORKSPACE, "resources", "resources.json");
            const resourcesData = JSON.parse(fs.readFileSync(resourcesPath, "utf8"));
            const normalizedUrl = url.toString();
            const duplicate = resourcesData.resources.find((resource) => {
              try {
                return resource.id === id || new URL(resource.url).toString() === normalizedUrl;
              } catch {
                return resource.id === id || resource.url === normalizedUrl;
              }
            });
            if (duplicate) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: `资源已存在于正式数据库：\`${duplicate.id}\`。`
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issueNumber,
                state: "closed",
                state_reason: "completed"
              });
              core.setOutput("action", "duplicate");
              core.setOutput("resource_id", duplicate.id);
              return;
            }

            const maintainerContent = parseMaintainerContent(parsedCommand.note);
            const maintainerSummary = maintainerContent.summary || maintainerContent.freeform;
            const summary = [userSummary, maintainerSummary].filter(Boolean).join("\n");
            const summaryShort = maintainerContent.summaryShort || makeSummaryShort(maintainerSummary || userSummary);
            const riskDefaults = riskDefaultsFor(category);
            const verificationNotes = [
              `维护者 @${actor} 已通过 ok 确认收录。`,
              checkedAtInput ? `测试信息：${checkedAtInput}。` : "",
              maintainerSummary ? `维护者补充：${maintainerSummary}` : "",
              `提交者风险说明：${riskText || "未提供"}`
            ].filter(Boolean).join(" ");

            const resource = {
              id,
              name,
              url: normalizedUrl,
              category,
              summary,
              summary_short: summaryShort,
              tags: categoryLabel && categoryLabel !== "其他" ? [categoryLabel] : [],
              access: {
                requires_login: false,
                free_level: "unknown",
                regions: ["GLOBAL"]
              },
              scores: {
                more: 4.0,
                speed: 4.0,
                clean: 4.0,
                stable: 4.0,
                ease: 4.0
              },
              risks: riskDefaults,
              verification: {
                status: category === "open_source" ? "recommended" : "caution",
                last_checked: submittedDate,
                method: "manual",
                notes: verificationNotes
              },
              source: {
                submitted_by: `@${issue.user.login}`,
                added_at: today
              },
              featured: true
            };

            resourcesData.updated_at = today;
            resourcesData.resources.push(resource);
            fs.writeFileSync(resourcesPath, `${JSON.stringify(resourcesData, null, 2)}\n`, "utf8");

            core.setOutput("action", "approved");
            core.setOutput("resource_id", id);
            core.setOutput("resource_name", name);

            function parseReviewCommand(value) {
              const trimmed = value.trim();
              if (!trimmed) {
                return { command: "", note: "" };
              }
              const newlineIndex = trimmed.search(/\r?\n/);
              const firstLine = newlineIndex === -1 ? trimmed : trimmed.slice(0, newlineIndex);
              const rest = newlineIndex === -1 ? "" : trimmed.slice(newlineIndex).trim();
              const commandMatch = firstLine.match(/^(\S+)(?:\s+([\s\S]*))?$/);
              const command = (commandMatch?.[1] ?? "").toLowerCase();
              const sameLineNote = commandMatch?.[2]?.trim() ?? "";
              return {
                command,
                note: [sameLineNote, rest].filter(Boolean).join("\n").trim()
              };
            }

            function parseMaintainerContent(value) {
              const text = value.trim();
              if (!text) {
                return { summary: "", summaryShort: "", freeform: "" };
              }
              const summary = labelledValue(text, ["简介", "介绍", "summary"]);
              const summaryShort = labelledValue(text, ["短介", "短简介", "summary_short"]);
              const labelledLinePattern =
                /^\s*(简介|介绍|summary|短介|短简介|summary_short)\s*[:：]\s*/gim;
              const freeform = labelledLinePattern.test(text) ? "" : text;
              return { summary, summaryShort: makeSummaryShort(summaryShort), freeform };
            }

            function labelledValue(text, labels) {
              const escapedLabels = labels.map((label) => label.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|");
              const pattern = new RegExp(
                `(?:^|\\n)\\s*(?:${escapedLabels})\\s*[:：]\\s*([^\\n]+)`,
                "i"
              );
              return pattern.exec(text)?.[1]?.trim() ?? "";
            }

            function normalizeText(value) {
              return String(value)
                .replace(/[`*_>#-]/g, "")
                .replace(/\s+/g, " ")
                .trim();
            }

            function makeSummaryShort(value) {
              const normalized = normalizeText(value);
              const chars = Array.from(normalized);
              return chars.length > 40 ? chars.slice(0, 40).join("") : normalized;
            }

            function riskDefaultsFor(category) {
              if (category === "open_source") {
                return {
                  copyright: "unknown",
                  safety: "medium",
                  privacy: "unknown",
                  payment: "low"
                };
              }
              if (category === "membership") {
                return {
                  copyright: "unknown",
                  safety: "medium",
                  privacy: "unknown",
                  payment: "medium"
                };
              }
              if (["online_video", "video_app", "player", "tvbox_config", "cloud_search", "magnet_search", "subscription"].includes(category)) {
                return {
                  copyright: "high",
                  safety: "medium",
                  privacy: "unknown",
                  payment: "unknown"
                };
              }
              return {
                copyright: "unknown",
                safety: "medium",
                privacy: "unknown",
                payment: "unknown"
              };
            }

      - name: Sync featured resources to README
        if: steps.review.outputs.action == 'approved'
        run: node scripts/sync-readme.mjs

      - name: Check featured resources
        if: steps.review.outputs.action == 'approved'
        run: node scripts/check-availability.mjs

      - name: Validate data
        if: steps.review.outputs.action == 'approved'
        run: node scripts/validate-data.mjs

      - name: Commit published resource
        if: steps.review.outputs.action == 'approved'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md resources/resources.json reports/availability.json
          git diff --cached --quiet && {
            echo "No resource changes to commit."
            exit 1
          }
          git commit -m "feat: publish resource from issue #${{ github.event.issue.number }}"
          git push

      - name: Close approved issue
        if: steps.review.outputs.action == 'approved'
        uses: actions/github-script@v9
        env:
          RESOURCE_ID: ${{ steps.review.outputs.resource_id }}
          RESOURCE_NAME: ${{ steps.review.outputs.resource_name }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.issue.number;
            const resourceId = process.env.RESOURCE_ID;
            const resourceName = process.env.RESOURCE_NAME;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: [
                `已自动收录资源：\`${resourceName}\`（\`${resourceId}\`）。`,
                "",
                "资源已加入正式数据库，并已同步到 README 首页精选。"
              ].join("\n")
            });
            await github.rest.issues.update({
              owner,
              repo,
              issue_number: issueNumber,
              state: "closed",
              state_reason: "completed"
            });
